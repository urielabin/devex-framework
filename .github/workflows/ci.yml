name: DevEx Framework CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  python-cli-tests:
    name: Python CLI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: tools/devex-cli
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check src/

      - name: Type check (mypy)
        run: uv run mypy src/

      - name: Run unit tests
        run: uv run pytest tests/ -v --tb=short -k "not pbt"

      - name: Run Property-Based Tests (PBT)
        run: uv run pytest tests/test_pbt_validators.py -v --tb=short

  typescript-framework-tests:
    name: TypeScript Framework Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/workflow-framework
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Lint (ESLint)
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build
