name: Release

# Triggered by pushing a semver tag: git tag v1.2.3 && git push --tags
# Creates a GitHub Release with auto-generated notes and publishes
# build artifacts for both the Python CLI and TypeScript framework.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release-python-cli:
    name: Build Python CLI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/devex-cli
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build wheel + sdist
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-cli-dist
          path: tools/devex-cli/dist/

  release-typescript-framework:
    name: Build TypeScript Framework
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/workflow-framework
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install and build
        run: |
          pnpm install
          pnpm build

      - name: Pack tarball
        run: pnpm pack

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: typescript-framework-dist
          path: packages/workflow-framework/*.tgz

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [release-python-cli, release-typescript-framework]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/python-cli-dist/*
            release-artifacts/typescript-framework-dist/*
          body: |
            ## Installation

            ### Python CLI (uv)
            ```bash
            uv tool install "git+https://github.com/${{ github.repository }}@${{ github.ref_name }}#subdirectory=tools/devex-cli"
            ```

            ### TypeScript Framework (pnpm)
            ```bash
            pnpm add "github:${{ github.repository }}#${{ github.ref_name }}&path:packages/workflow-framework"
            ```
