# Local development environment for projects following the Golden Path.
# Provides a DynamoDB Local instance so teams can run tests without AWS credentials.
#
# Usage:
#   docker compose up -d          # start all services
#   docker compose down           # stop and remove containers
#   docker compose logs -f        # tail logs
#
# Environment variables (override via .env file):
#   DYNAMODB_PORT  — local port for DynamoDB (default: 8000)
#   AWS_REGION     — region stub for the SDK (default: us-east-1)

services:

  # ── DynamoDB Local ──────────────────────────────────────────────────────────
  # Drop-in replacement for AWS DynamoDB — no credentials required locally.
  # Connect via: http://localhost:${DYNAMODB_PORT:-8000}
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: devex-dynamodb
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    ports:
      - "${DYNAMODB_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8000/ > /dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── DynamoDB Admin UI ───────────────────────────────────────────────────────
  # Browse tables and items at http://localhost:8001
  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    container_name: devex-dynamodb-admin
    environment:
      DYNAMO_ENDPOINT: "http://dynamodb-local:8000"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      AWS_ACCESS_KEY_ID: "local"
      AWS_SECRET_ACCESS_KEY: "local"
    ports:
      - "8001:8001"
    depends_on:
      dynamodb-local:
        condition: service_healthy

  # ── Table bootstrap ─────────────────────────────────────────────────────────
  # Creates the DynamoDB table required by projects using the Golden Path CDK pattern.
  # Runs once and exits — safe to re-run (idempotent).
  table-init:
    image: amazon/aws-cli:latest
    container_name: devex-table-init
    environment:
      AWS_ACCESS_KEY_ID: "local"
      AWS_SECRET_ACCESS_KEY: "local"
      AWS_DEFAULT_REGION: "${AWS_REGION:-us-east-1}"
    depends_on:
      dynamodb-local:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        echo 'Creating local DynamoDB table...' &&
        aws dynamodb create-table
        --endpoint-url http://dynamodb-local:8000
        --table-name local-transactions
        --attribute-definitions AttributeName=PK,AttributeType=S AttributeName=SK,AttributeType=S
        --key-schema AttributeName=PK,KeyType=HASH AttributeName=SK,KeyType=RANGE
        --billing-mode PAY_PER_REQUEST
        2>&1 | grep -v ResourceInUseException || true &&
        echo 'Table ready.'
    restart: "no"

networks:
  default:
    name: devex-local
